<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Tính Lương Tháng Cá Nhân</title>
    
    <!-- Cấu hình ứng dụng chạy trên điện thoại (PWA) -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e3a8a" />
    
    <!-- Hỗ trợ hiển thị toàn màn hình trên iOS (Apple) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tính Lương" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3061/3061341.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Đăng ký Service Worker để hỗ trợ chế độ Offline -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA Service Worker registered successfully:', reg.scope))
            .catch(err => console.log('PWA Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
